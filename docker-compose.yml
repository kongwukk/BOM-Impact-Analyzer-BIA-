name: bia

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bom_db
      POSTGRES_USER: bom_user
      POSTGRES_PASSWORD: bom_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bom_user -d bom_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple
      - PIP_TRUSTED_HOST=pypi.tuna.tsinghua.edu.cn
      - BIA_DATABASE_URL=postgresql+psycopg://bom_user:bom_password@postgres:5432/bom_db
      - BIA_CORS_ORIGINS=http://localhost:3000
      - BIA_UPLOAD_DIR=/app/data/uploads
      - BIA_LLM_ENABLED=${BIA_LLM_ENABLED:-false}
      - BIA_LLM_API_KEY=${BIA_LLM_API_KEY:-}
      - BIA_LLM_BASE_URL=${BIA_LLM_BASE_URL:-https://api.openai.com/v1}
      - BIA_LLM_MODEL=${BIA_LLM_MODEL:-gpt-4o-mini}
    volumes:
      - upload_data:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  # Explicit names keep the same data even if the repository directory or
  # Compose invocation path changes. `docker compose up --build` reuses them.
  postgres_data:
    name: bia_postgres_data
  upload_data:
    name: bia_upload_data
